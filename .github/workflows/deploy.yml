name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # mainブランチにpushされたら実行

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build
        run: |
          npm install
          npm run build
        env:
          # ここに .env で設定した変数を追加
          VITE_KINTONE_BASE_URL: ${{ secrets.VITE_KINTONE_BASE_URL }}
          VITE_KINTONE_API_TOKEN: ${{ secrets.VITE_KINTONE_API_TOKEN }}
          VITE_KINTONE_API_PLAN_TOKEN: ${{ secrets.VITE_KINTONE_API_PLAN_TOKEN }}
          VITE_KINTONE_API_EXHIBITION_TOKEN: ${{ secrets.VITE_KINTONE_API_EXHIBITION_TOKEN }}
          VITE_APP_ID_PLAN: ${{ secrets.VITE_APP_ID_PLAN }}
          VITE_APP_ID_BOOTH_LOG: ${{ secrets.VITE_APP_ID_BOOTH_LOG }}

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # ビルドされたファイルがある場所
          branch: gh-pages # gh-pagesブランチにデプロイ